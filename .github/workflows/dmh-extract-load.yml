name: DMH KHIS Extract & Load

# Extracts KHIS data via the khis-extractor repo, then loads the resulting
# CSVs into the dashboard's Postgres dmh_dashboard tables. Runs on the 18th
# and 28th of each month at 06:00 UTC, plus manual triggers.
#
# Required repo secrets:
#   KHIS_USERNAME      — DHIS2 / KHIS account username
#   KHIS_PASSWORD      — DHIS2 / KHIS account password
#   KHIS_REPO_PAT      — GitHub PAT with read access to the extractor repo
#   DATABASE_URL       — prod Postgres connection string (postgres://...)
#   KHIS_EXTRACTOR_REPO — e.g. "karasinga/khis-extractor"  (variable, not secret)

on:
  schedule:
    - cron: '0 6 18,28 * *'   # 06:00 UTC on the 18th and 28th
  workflow_dispatch:          # manual trigger ( Actions tab → Run workflow )

# Prevent overlapping runs if a schedule fires while a manual run is in flight.
concurrency:
  group: dmh-extract-load
  cancel-in-progress: false

env:
  EXTRACTOR_REPO: ${{ vars.KHIS_EXTRACTOR_REPO || 'karasinga/khis_data_extraction' }}

jobs:
  extract-load:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout extractor
        uses: actions/checkout@v4
        with:
          repository: ${{ env.EXTRACTOR_REPO }}
          token: ${{ secrets.KHIS_REPO_PAT }}
          path: extractor

      - name: Checkout dashboard
        uses: actions/checkout@v4
        with:
          path: dashboard

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            extractor/requirements.txt
            dashboard/backend/requirements.txt

      - name: Install extractor deps
        run: pip install -r extractor/requirements.txt

      - name: Run KHIS extraction
        env:
          KHIS_USERNAME: ${{ secrets.KHIS_USERNAME }}
          KHIS_PASSWORD: ${{ secrets.KHIS_PASSWORD }}
        run: |
          cd extractor
          # --skip-upsert = cloud mode: extractor must NOT consolidate into
          # local master CSVs (it would delete the timestamped outputs and
          # write to a Windows-only POWERBI_ROOT path). Requires the
          # extractor patch gating _consolidate_to_master behind --skip-upsert.
          python run_all_moh.py --skip-upsert --output-dir ../outputs
          python run_all_reporting.py --skip-upsert --output-dir ../outputs

      - name: Show extracted files
        run: find outputs -name '*.csv' -printf '%p  %s bytes\n' | sort

      - name: Install dashboard deps
        run: pip install -r dashboard/backend/requirements.txt

      - name: Load CSVs into Postgres
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          USE_SQLITE: 'false'
        working-directory: dashboard/backend
        run: python manage.py load_dmh_csvs --dir ../../outputs --trigger cron
